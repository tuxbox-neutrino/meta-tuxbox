Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0"
EndSection

Section "Monitor"
    Identifier "Monitor0"
EndSection

Section "Device"
    Identifier "QEMU VGA"
    Driver "modesetting"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "QEMU VGA"
    Monitor "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1280x720" "1024x768" "800x600"
    EndSubSection
EndSection
