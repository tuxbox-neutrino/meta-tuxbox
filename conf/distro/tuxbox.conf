# Tuxbox-OS Distribution Configuration
#
# Distribution for Tuxbox-Neutrino (not Enigma2)
# Based on OE-Alliance infrastructure

require conf/distro/poky.conf

# Distribution identity
DISTRO = "tuxbox"
DISTRO_NAME = "Tuxbox-OS"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "kirkstone"

# Maintainer
MAINTAINER = "Tuxbox Neutrino Team <team@tuxbox-neutrino.org>"

# Distribution features (NO Enigma2-specific features)
DISTRO_FEATURES = "systemd \
                   alsa \
                   bluetooth \
                   nfs \
                   zeroconf \
                   pam \
                   ipv4 \
                   ipv6 \
                   wifi \
                   largefile \
                   opengl \
                   usbhost \
                   usbgadget \
                   ext2 \
                   vfat \
                   "

# Remove sysvinit, use systemd exclusively
DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit"

# Virtual providers - Use Neutrino instead of Enigma2
PREFERRED_PROVIDER_virtual/egl ?= "mesa"
PREFERRED_PROVIDER_virtual/libgl ?= "mesa"
PREFERRED_PROVIDER_virtual/libgles2 ?= "mesa"

# Init system
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"
VIRTUAL-RUNTIME_dev_manager = "systemd"

# Package management
PACKAGE_CLASSES ?= "package_ipk"
EXTRA_IMAGE_FEATURES ?= "debug-tweaks"

# Image naming
IMAGE_NAME = "${IMAGE_BASENAME}-${MACHINE}-${DATETIME}"
IMAGE_NAME[vardepsexclude] = "DATETIME"
IMAGE_VERSION ?= "${DISTRO_VERSION}"
IMAGE_NAME_SUFFIX = ".tuxbox"

# Optimization flags
# Default to size optimization
FULL_OPTIMIZATION = "-Os -pipe ${DEBUG_FLAGS}"

# Performance-critical packages get -O3
FULL_OPTIMIZATION:pn-flac = "-O3 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-libogg = "-O3 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-libvorbis = "-O3 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-zlib = "-O3 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-libpng = "-O3 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-ffmpeg = "-O3 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-gstreamer1.0 = "-O3 -pipe ${DEBUG_FLAGS}"

# Stability-critical packages get -O2
FULL_OPTIMIZATION:pn-systemd = "-O2 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-busybox = "-O2 -pipe ${DEBUG_FLAGS}"
FULL_OPTIMIZATION:pn-openssl = "-O2 -pipe ${DEBUG_FLAGS}"

# Toolchain
TCLIBC ?= "glibc"
TCMODE ?= "default"

# GCC configuration
GCCVERSION ?= "11.%"
SDKGCCVERSION ?= "${GCCVERSION}"

# Kernel
PREFERRED_PROVIDER_virtual/kernel ?= "linux-yocto"
PREFERRED_VERSION_linux-yocto ?= "5.15%"

# Include OE-Alliance shared configurations if available
include conf/distro/include/unstable-versions.inc

# Feed configuration
DISTRO_FEED_URI ?= "http://feed.tuxbox-neutrino.org/${DISTRO_VERSION}"
DISTRO_FEED_PREFIX ?= "tuxbox"

# SDK configuration
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"
SDKPATH = "/opt/${DISTRO}/${SDK_VERSION}"

# Default timezone
DEFAULT_TIMEZONE ?= "Europe/Berlin"

# Locale support
IMAGE_LINGUAS ?= "en-us en-gb de-de fr-fr"

# Additional DISTRO-specific packages
DISTRO_EXTRA_RDEPENDS += " \
    "

DISTRO_EXTRA_RRECOMMENDS += " \
    "

# Build type
DISTRO_TYPE ?= "release"

# Release build settings
INHERIT += "${@oe.utils.conditional('DISTRO_TYPE', 'release', 'rm_work', '', d)}"

# Development build settings
INHERIT += "${@oe.utils.conditional('DISTRO_TYPE', 'development', 'buildhistory buildstats', '', d)}"
BUILDHISTORY_COMMIT ?= "1"

# Security flags
require conf/distro/include/security_flags.inc

# Version information
TUXBOX_VERSION = "${DISTRO_VERSION}"
TUXBOX_BUILD_DATE = "${DATETIME}"
TUXBOX_BUILD_DATE[vardepsexclude] = "DATETIME"
