# Layer configuration for meta-tuxbox
#
# This layer provides the Tuxbox-OS distribution for Neutrino
# Compatible with OE-Alliance and Yocto Kirkstone

# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES (with and without subdirs)
BBFILES += "${LAYERDIR}/recipes-*/*.bb \
            ${LAYERDIR}/recipes-*/*.bbappend \
            ${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend \
            ${LAYERDIR}/recipes-*/*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*/*.bbappend"

BBFILE_COLLECTIONS += "tuxbox"
BBFILE_PATTERN_tuxbox := "^${LAYERDIR}/"
BBFILE_PRIORITY_tuxbox = "11"

# Layer compatibility
LAYERSERIES_COMPAT_tuxbox = "kirkstone"

# Layer dependencies
LAYERDEPENDS_tuxbox = "core openembedded-layer"

# Additional license directories
LICENSE_PATH += "${LAYERDIR}/files/custom-licenses"

# Layer information
LAYERVERSION_tuxbox = "1"
LAYER_CONF_VERSION ?= "1"

# Global mask to keep Enigma2 content out of Neutrino builds
BBMASK ?= ".*enigma2.*|.*/oe-alliance/meta-oe/recipes-distros/.*|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2-plugins/.*|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2-skins.*|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2-.*"

# Mask Enigma2-specific content from OE-Alliance we do not use for Neutrino
# Keep OA hardware/brand support intact.
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-distros/"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2.*"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2-skins.*"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-multimedia/gstreamer1.0/.*dvbmediasink.*"
BBMASK .= "|.*/enigma2-plugins/.*"
BBMASK .= "|.*/enigma2-plugin-.*"
BBMASK .= "|.*/enigma2-pliplugins.*"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2/.*"
BBMASK .= "|.*/gstreamer1.0-plugin-subsink.*"
BBMASK .= "|.*/jedimakerxtream.*"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-core/base-files/base-files_3.0.14.bbappend"

# Remove legacy hosttool requirements not needed for Neutrino
HOSTTOOLS:remove = "python python2 python2.7 sshpass"
