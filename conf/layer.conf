# Layer configuration for meta-tuxbox
#
# This layer provides the Tuxbox-OS distribution for Neutrino
# Compatible with OE-Alliance and Yocto Kirkstone

# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "tuxbox"
BBFILE_PATTERN_tuxbox := "^${LAYERDIR}/"
BBFILE_PRIORITY_tuxbox = "10"

# Layer compatibility
LAYERSERIES_COMPAT_tuxbox = "kirkstone"

# Layer dependencies
LAYERDEPENDS_tuxbox = "core openembedded-layer"

# Additional license directories
LICENSE_PATH += "${LAYERDIR}/files/custom-licenses"

# Layer information
LAYERVERSION_tuxbox = "1"
LAYER_CONF_VERSION ?= "1"
