# shellcheck shell=sh
# Feed root that contains channel/imagedir/build_date/manifest.json
FEED_ROOT=/srv/tuxbox/feed

# Public base URL to static feed artifacts (used by API download redirects)
ARTIFACT_BASE_URL=https://images.tuxbox-neutrino.org/feed

# Catalog output consumed by the API runtime
CATALOG_FILE=/var/lib/image-portal/catalog.json

# Optional allowlist passed to catalog builder.
ALLOWED_CHANNELS=release,beta,nightly

# Integrity toggles for catalog import.
VERIFY_FILE_HASHES=1
VERIFY_FILE_SIZES=1
VERIFY_MANIFEST_SIGNATURES=0

# Public key path for detached manifest signature verification.
# Used only when VERIFY_MANIFEST_SIGNATURES=1.
MANIFEST_PUBKEY=
